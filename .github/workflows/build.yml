name: Build Portable Executables

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # -----------------------------------------------------------------------
  # Windows
  # -----------------------------------------------------------------------
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt pyinstaller

      - name: Build executable
        run: pyinstaller build.spec

      - name: Upload artefact
        uses: actions/upload-artifact@v4
        with:
          name: FreeDBC-Windows
          path: dist/FreeDBC_EditorPreviewer.exe

  # -----------------------------------------------------------------------
  # macOS
  # -----------------------------------------------------------------------
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt pyinstaller

      - name: Build executable
        run: pyinstaller build.spec

      - name: Upload artefact
        uses: actions/upload-artifact@v4
        with:
          name: FreeDBC-macOS
          path: dist/FreeDBC_EditorPreviewer

  # -----------------------------------------------------------------------
  # Linux
  # -----------------------------------------------------------------------
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system Tk
        run: sudo apt-get install -y python3-tk

      - name: Install dependencies
        run: pip install -r requirements.txt pyinstaller

      - name: Build executable
        run: pyinstaller build.spec

      - name: Upload artefact
        uses: actions/upload-artifact@v4
        with:
          name: FreeDBC-Linux
          path: dist/FreeDBC_EditorPreviewer

  # -----------------------------------------------------------------------
  # Create GitHub Release (only on tag push)
  # -----------------------------------------------------------------------
  release:
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download all artefacts
        uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            FreeDBC-Windows/FreeDBC_EditorPreviewer.exe
            FreeDBC-macOS/FreeDBC_EditorPreviewer
            FreeDBC-Linux/FreeDBC_EditorPreviewer
